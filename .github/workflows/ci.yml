name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Phase 0 validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out the validated revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install locked dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install --no-build-isolation --no-deps .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Unit tests
        run: python -m pytest

      - name: Static security checks
        run: python -m bandit -r evidenceops scripts -c pyproject.toml

      - name: Secret scan
        run: python scripts/check_secrets.py

      - name: Dependency vulnerability audit
        run: python -m pip_audit -r requirements-dev.txt

      - name: Build documentation
        run: mkdocs build --strict

      - name: Scan generated public site
        run: python scripts/check_public_artifacts.py site
